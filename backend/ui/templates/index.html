<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Intelligence Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #4f46e5;
            --accent-purple: #9333ea;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-height: 100vh;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.025em; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-label { color: var(--text-secondary); font-size: 0.875rem; }
        .metric-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            transition: width 0.5s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th { text-align: left; color: var(--text-secondary); padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        td { padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .status-badge {
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-success { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
        .status-warning { background: rgba(234, 179, 8, 0.1); color: #fde047; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body hx-get="/ui/refresh" hx-trigger="every 5s">
    
    <header class="header">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <div style="width: 12px; height: 12px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 10px #4ade80;"></div>
            <h1>Antigravity Intelligence Dashboard</h1>
        </div>
        <div style="font-size: 0.875rem; color: var(--text-secondary);">v{{ version }}</div>
    </header>

    <div class="dashboard-grid">
        <!-- Resource Card -->
        <section class="card">
            <h3>System Hardware</h3>
            <div id="hardware-stats">
                {% include 'partials/hardware.html' %}
            </div>
        </section>

        <!-- Active Models Card -->
         <section class="card">
            <h3>Intelligence Routing</h3>
            <div class="metric">
                <span class="metric-label">Default Model</span>
                <span class="metric-value">{{ default_model }}</span>
            </div>
             <div class="metric">
                <span class="metric-label">Vision Model</span>
                <span class="metric-value">{{ vision_model }}</span>
            </div>
            <div style="margin-top: auto;">
                <select class="btn" style="width: 100%; text-align: left; background: rgba(255,255,255,0.05); color: var(--text-primary);">
                    <option disabled selected>Manually Select Model...</option>
                    {% for model in available_models %}
                    <option value="{{ model }}">{{ model }}</option>
                    {% endfor %}
                </select>
            </div>
        </section>
    </div>

    <!-- Trace Log Section -->
    <section class="card" style="flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Pipeline Trace Logs</h3>
            <span style="font-size: 0.75rem; color: var(--text-secondary);">Real-time Activity</span>
        </div>
        <div id="trace-history">
             {% include 'partials/traces.html' %}
        </div>
    </section>

</body>
</html>
